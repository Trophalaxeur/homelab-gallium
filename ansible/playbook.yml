---
# Required collections (install once on the control node):
#   ansible-galaxy collection install -r ansible/requirements.yml

- name: Deploy AdGuard Home
  hosts: adguard
  become: true
  gather_facts: false

  # Variables publiques : ansible/group_vars/all/vars.yml
  # Secrets       : ansible/group_vars/all/vault.yml (gitignored — ansible-vault)

  pre_tasks:
    # ssh-keyscan auto-population is TOFU — acceptable on a freshly provisioned
    # LXC in a controlled homelab network. Restrict to ed25519 to avoid
    # recording multiple key types unexpectedly.
    # For higher-security contexts: pin expected fingerprints out-of-band
    # (Proxmox console → check /etc/ssh/ssh_host_ed25519_key.pub).
    # No 'always' tag: the adguard play is run as a whole, not with --tags filters.
    # Pair --tags phase1/phase2 (neon) with --limit neon to avoid touching adguard.
    - name: Accept host key
      ansible.builtin.known_hosts:
        name: "{{ ansible_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 ' + ansible_host) }}"
        state: present
      delegate_to: localhost
      become: false

    - name: Gather facts
      ansible.builtin.gather_facts:

  roles:
    - adguard-home

- name: Deploy neon agent platform
  hosts: neon
  become: true
  gather_facts: false   # gather AFTER known_hosts pre_task to avoid TOFU on first run

  # Phase 1 (before Manual Setup): ansible-playbook playbook.yml --tags phase1
  # Phase 2 (after  Manual Setup): ansible-playbook playbook.yml --tags phase2
  #
  # Vault vars required — add via `ansible-vault edit group_vars/all/vault.yml`:
  #   vault_smtp_password, vault_claude_oauth_token, vault_multica_jwt_secret
  #   vault_gh_admin_token   (Phase 1)
  #   vault_multica_pat      (Phase 2 only)

  pre_tasks:
    # ssh-keyscan auto-population is TOFU — acceptable on a freshly provisioned
    # LXC in a controlled homelab network. Restrict to ed25519 to avoid
    # recording multiple key types unexpectedly.
    # For higher-security contexts: pin expected fingerprints out-of-band
    # (Proxmox console → check /etc/ssh/ssh_host_ed25519_key.pub).
    # 'always' tag ensures these run even under --tags phase1/phase2 filters
    # (without it, --tags phase1 would skip pre_tasks → SSH/facts broken).
    - name: Accept host key
      ansible.builtin.known_hosts:
        name: "{{ ansible_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 ' + ansible_host) }}"
        state: present
      delegate_to: localhost
      become: false
      tags: always

    - name: Gather facts
      ansible.builtin.gather_facts:
      tags: always

  roles:
    - neon-agent
