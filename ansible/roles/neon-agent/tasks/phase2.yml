---
# Step 16 — multica CLI config (cloud mode)
- name: Configure multica CLI for cloud (multica.ai)
  become_user: neonuser
  command: /usr/local/bin/multica setup cloud
  args:
    creates: /home/neonuser/.multica/config.json

# Idempotent login: grep exits 0 if "Not authenticated" is found → need to login.
- name: Check multica CLI auth status
  become_user: neonuser
  shell: /usr/local/bin/multica auth status 2>&1 | grep -q 'Not authenticated'
  register: multica_not_authed
  failed_when: false
  changed_when: false

- name: Log in multica CLI with PAT
  become_user: neonuser
  command: /usr/local/bin/multica login --token {{ vault_multica_pat }}
  no_log: true
  when: multica_not_authed.rc == 0

# Step 17 — re-deploy /etc/neon.env with MULTICA_TOKEN (cloud PAT)
# The template includes MULTICA_TOKEN conditionally when vault_multica_pat is defined.
# Re-running Phase 1 after this point preserves the token (single source of truth).
- name: Re-deploy /etc/neon.env with MULTICA_TOKEN
  template:
    src: neon-env.j2
    dest: /etc/neon.env
    owner: root
    group: neonuser
    mode: "0640"
  no_log: true
  notify: restart multica-daemon

# Step 18 — systemd daemon service
- name: Deploy multica-daemon systemd service
  template:
    src: multica-daemon.service.j2
    dest: /etc/systemd/system/multica-daemon.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Enable and start multica-daemon
  systemd:
    name: multica-daemon
    state: started
    enabled: true
    daemon_reload: true
