---
- name: Install dependencies
  apt:
    name: [curl, git, tar, socat, openssl, cron]
    state: present
    update_cache: true

- name: Create AdGuard Home directory
  file:
    path: /opt/AdGuardHome
    state: directory
    mode: "0755"

- name: Download AdGuard Home
  get_url:
    url: "https://static.adguard.com/adguardhome/release/AdGuardHome_linux_amd64.tar.gz"
    dest: /tmp/adguard-home.tar.gz
    mode: "0644"

- name: Extract AdGuard Home binary
  unarchive:
    src: /tmp/adguard-home.tar.gz
    dest: /tmp
    remote_src: true

- name: Install binary
  copy:
    src: /tmp/AdGuardHome/AdGuardHome
    dest: /opt/AdGuardHome/AdGuardHome
    mode: "0755"
    remote_src: true

# Certificates are provisioned BEFORE deploying config + starting service,
# so AdGuard finds valid TLS material on first start (no degraded HTTP-only run).
- name: Create cert directory
  file:
    path: /opt/AdGuardHome/cert
    state: directory
    mode: "0750"

- name: Clone acme.sh (pinned)
  git:
    repo: https://github.com/acmesh-official/acme.sh.git
    dest: /tmp/acme.sh-src
    version: "3.1.3"
    force: false

- name: Install acme.sh from source
  shell: ./acme.sh --install --home /root/.acme.sh
  args:
    chdir: /tmp/acme.sh-src
    creates: /root/.acme.sh/acme.sh
  environment:
    HOME: /root

- name: Register acme.sh account email
  command: /root/.acme.sh/acme.sh --register-account -m {{ acme_email }} --server letsencrypt
  environment:
    HOME: /root
  args:
    creates: /root/.acme.sh/ca/acme-v02.api.letsencrypt.org/directory/account.json

- name: Issue certificate for {{ adguard_domain }}
  command: >
    /root/.acme.sh/acme.sh --issue
    -d {{ adguard_domain }}
    --dns dns_online
    --server letsencrypt
    --accountemail {{ acme_email }}
    --keylength ec-256
  environment:
    HOME: /root
    ONLINE_API_KEY: "{{ online_api_key }}"
  register: acme_issue
  failed_when: acme_issue.rc not in [0, 2]
  changed_when: acme_issue.rc == 0
  no_log: true
  args:
    creates: /root/.acme.sh/{{ adguard_domain }}_ecc/{{ adguard_domain }}.cer

- name: Deploy AdGuard configuration
  template:
    src: adguard-home.yaml.j2
    dest: /opt/AdGuardHome/AdGuardHome.yaml
    mode: "0600"
  notify: restart adguardhome

- name: Install AdGuard Home as systemd service
  command: /opt/AdGuardHome/AdGuardHome -s install
  args:
    creates: /etc/systemd/system/AdGuardHome.service

# Cert install runs the reloadcmd (systemctl restart) — this is what starts
# AdGuard for the first time, with valid cert files already in place.
- name: Install certificate to AdGuard cert directory
  command: >
    /root/.acme.sh/acme.sh --install-cert
    --ecc
    -d {{ adguard_domain }}
    --fullchain-file /opt/AdGuardHome/cert/cert.pem
    --key-file /opt/AdGuardHome/cert/key.pem
    --reloadcmd "systemctl restart AdGuardHome"
  environment:
    HOME: /root
  args:
    creates: /opt/AdGuardHome/cert/cert.pem

- name: Ensure AdGuard Home is started and enabled
  systemd:
    name: AdGuardHome
    state: started
    enabled: true
    daemon_reload: true

- name: Set up acme.sh cron for auto-renewal
  cron:
    name: "acme.sh renewal"
    minute: "0"
    hour: "0"
    job: 'HOME=/root /root/.acme.sh/acme.sh --cron --home /root/.acme.sh > /dev/null'

- name: Flush handlers
  meta: flush_handlers
